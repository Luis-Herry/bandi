name: Build draft release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag, for example v0.1.6
        required: true
        type: string
      signed_macos:
        description: Require Developer ID signing, notarization, stapling, and in-app macOS updates
        required: true
        default: false
        type: boolean

concurrency:
  group: bandi-draft-release-${{ inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    name: Validate tagged source
    # The desktop regression suite intentionally exercises Win32 drive and UNC
    # semantics, so release gating must run on the primary Windows platform.
    runs-on: windows-2025
    timeout-minutes: 30
    outputs:
      commit: ${{ steps.tag.outputs.commit }}
      version: ${{ steps.package.outputs.version }}
    steps:
      - name: Check out workflow source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve existing version tag
        id: tag
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REPOSITORY" != "Luis-Herry/bandi" ]]; then
            echo "This workflow only releases Luis-Herry/bandi." >&2
            exit 1
          fi
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "The release tag must be a version such as v0.1.6." >&2
            exit 1
          fi
          commit="$(git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}")"
          if [[ ! "$commit" =~ ^[0-9a-f]{40}$ ]]; then
            echo "The release tag does not resolve to a commit." >&2
            exit 1
          fi
          echo "commit=$commit" >> "$GITHUB_OUTPUT"

      - name: Check out tagged commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.tag.outputs.commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.14.1
          cache: npm

      - name: Validate package version
        id: package
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          if [[ "$RELEASE_TAG" != "v${version}" ]]; then
            echo "Tag ${RELEASE_TAG} does not match package version ${version}." >&2
            exit 1
          fi
          if [[ "$(git rev-parse HEAD)" != "${{ steps.tag.outputs.commit }}" ]]; then
            echo "Checked out commit does not match the tag." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Run source checks
        shell: bash
        env:
          # Avoid the runner account's 8.3 TEMP alias (RUNNER~1), which makes a
          # single fixture path appear different before and after realpath().
          TEMP: ${{ runner.temp }}
          TMP: ${{ runner.temp }}
        run: |
          set -euo pipefail
          npm test
          npx tsc --noEmit
          git diff --check

  windows:
    name: Windows x64 unsigned draft artifacts
    needs: preflight
    runs-on: windows-2025
    timeout-minutes: 90
    steps:
      - name: Check out tagged commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.preflight.outputs.commit }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.14.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Setup and portable packages without publishing
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          $ErrorActionPreference = "Stop"
          npm run build
          npm run desktop:prepare
          node node_modules/electron-builder/out/cli/cli.js --win --x64 --publish never

      - name: Verify unsigned Windows artifacts
        shell: pwsh
        env:
          APP_VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          $ErrorActionPreference = "Stop"
          $setup = "release/Bandi-Setup-$env:APP_VERSION-x64.exe"
          $portable = "release/Bandi-$env:APP_VERSION-x64-portable.exe"
          foreach ($file in @($setup, $portable)) {
            if (-not (Test-Path -LiteralPath $file -PathType Leaf)) {
              throw "Missing Windows artifact: $file"
            }
            $signature = Get-AuthenticodeSignature -LiteralPath $file
            if ($signature.Status -ne "NotSigned") {
              throw "This draft workflow must remain unsigned until Authenticode is configured."
            }
          }

      - name: Stage Windows release assets
        shell: pwsh
        env:
          APP_VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          $ErrorActionPreference = "Stop"
          $target = Join-Path $env:RUNNER_TEMP "bandi-release-assets"
          New-Item -ItemType Directory -Path $target -Force | Out-Null
          @(
            "release/Bandi-Setup-$env:APP_VERSION-x64.exe",
            "release/Bandi-Setup-$env:APP_VERSION-x64.exe.blockmap",
            "release/Bandi-$env:APP_VERSION-x64-portable.exe",
            "release/latest.yml"
          ) | ForEach-Object {
            if (-not (Test-Path -LiteralPath $_ -PathType Leaf)) {
              throw "Missing Windows release asset: $_"
            }
            Copy-Item -LiteralPath $_ -Destination $target
          }

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-windows-x64
          path: ${{ runner.temp }}/bandi-release-assets/*
          if-no-files-found: error
          retention-days: 7

  macos:
    name: macOS ${{ matrix.arch }} unsigned draft artifacts
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    steps:
      - name: Check out tagged commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.preflight.outputs.commit }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.14.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore pinned libvips license texts
        shell: bash
        env:
          BANDI_MAC_ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          package_dir="node_modules/@img/sharp-libvips-darwin-${BANDI_MAC_ARCH}"
          test -d "$package_dir"
          license_dir="$(mktemp -d)"
          trap 'rm -rf "$license_dir"' EXIT

          curl --fail --silent --show-error --location \
            --proto '=https' --tlsv1.2 \
            https://raw.githubusercontent.com/spdx/license-list-data/98f5c2939d624d338d9fbc159d97f0994c7cfaf3/text/LGPL-3.0-only.txt \
            --output "$license_dir/LGPL-3.0.txt"
          echo "996af0513df21f7496288951c41428a03c174e9e4a9d63665c57d670f845ccb1  $license_dir/LGPL-3.0.txt" | shasum -a 256 --check

          {
            printf '@img/sharp-libvips-darwin-%s redistributes libvips under LGPL-3.0-or-later.\n' "$BANDI_MAC_ARCH"
            printf 'Source: https://github.com/lovell/sharp-libvips\n'
          } > "$package_dir/NOTICE"
          cp "$license_dir/LGPL-3.0.txt" "$package_dir/LICENSE"

      - name: Prepare Developer ID signing inputs
        if: ${{ inputs.signed_macos }}
        shell: bash
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          missing=()
          for name in \
            MAC_CSC_LINK \
            MAC_CSC_KEY_PASSWORD \
            APPLE_API_KEY_BASE64 \
            APPLE_API_KEY_ID \
            APPLE_API_ISSUER \
            APPLE_TEAM_ID; do
            if [[ -z "${!name:-}" ]]; then missing+=("$name"); fi
          done
          if [[ "${#missing[@]}" -ne 0 ]]; then
            printf 'Signed macOS release is missing required secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

          api_key="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          API_KEY_PATH="$api_key" node --input-type=module <<'NODE'
          import fs from "node:fs";

          fs.writeFileSync(
            process.env.API_KEY_PATH,
            Buffer.from(process.env.APPLE_API_KEY_BASE64, "base64"),
          );
          NODE
          if [[ ! -s "$api_key" ]]; then
            echo "APPLE_API_KEY_BASE64 did not produce a non-empty API key." >&2
            exit 1
          fi
          chmod 600 "$api_key"
          {
            echo "CSC_LINK=$MAC_CSC_LINK"
            echo "CSC_KEY_PASSWORD=$MAC_CSC_KEY_PASSWORD"
            echo "APPLE_API_KEY=$api_key"
            echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID"
            echo "APPLE_API_ISSUER=$APPLE_API_ISSUER"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
          } >> "$GITHUB_ENV"

      - name: Build DMG and ZIP without publishing
        shell: bash
        env:
          BANDI_MAC_ARCH: ${{ matrix.arch }}
          BANDI_MAC_RELEASE: ${{ inputs.signed_macos && '1' || '0' }}
          BANDI_MAC_AUTO_UPDATE: ${{ inputs.signed_macos && '1' || '0' }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ inputs.signed_macos && 'true' || 'false' }}
        run: |
          set -euo pipefail
          npm run "local-server:dist:${BANDI_MAC_ARCH}"

      - name: Verify macOS signing and update channel state
        shell: bash
        env:
          BANDI_MAC_ARCH: ${{ matrix.arch }}
          BANDI_MAC_SIGNED_RELEASE: ${{ inputs.signed_macos }}
        run: |
          set -euo pipefail
          app_count=0
          app_path=""
          while IFS= read -r -d '' candidate; do
            app_count=$((app_count + 1))
            app_path="$candidate"
          done < <(find "release/macos-${BANDI_MAC_ARCH}" -type d -name '*.app' -prune -print0)
          if [[ "$app_count" -ne 1 ]]; then
            echo "Expected exactly one app bundle." >&2
            exit 1
          fi
          if [[ "$BANDI_MAC_SIGNED_RELEASE" == "true" ]]; then
            /usr/bin/codesign --verify --deep --strict --verbose=2 "$app_path"
            if ! /usr/bin/codesign -dv --verbose=4 "$app_path" 2>&1 | grep -q '^Authority=Developer ID Application:'; then
              echo "Signed macOS release is missing the Developer ID Application authority." >&2
              exit 1
            fi
            /usr/sbin/spctl --assess --type execute --verbose=2 "$app_path"
            /usr/bin/xcrun stapler validate "$app_path"
            if [[ "$(APP_PATH="$app_path" node -p "require(process.env.APP_PATH + '/Contents/Resources/app/package.json').bandiMacAutoUpdate")" != "true" ]]; then
              echo "Signed macOS release did not enable the in-app update channel." >&2
              exit 1
            fi
          else
            if /usr/bin/codesign -dv --verbose=4 "$app_path" 2>&1 | grep -q '^Authority='; then
              echo "Unsigned macOS release unexpectedly contains a signing authority." >&2
              exit 1
            fi
            if [[ "$(APP_PATH="$app_path" node -p "require(process.env.APP_PATH + '/Contents/Resources/app/package.json').bandiMacAutoUpdate")" != "false" ]]; then
              echo "Unsigned macOS release unexpectedly enabled the in-app update channel." >&2
              exit 1
            fi
          fi

      - name: Stage macOS release assets
        shell: bash
        env:
          APP_VERSION: ${{ needs.preflight.outputs.version }}
          BANDI_MAC_ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          target="$RUNNER_TEMP/bandi-release-assets"
          mkdir -p "$target"
          base="Bandi-Local-Web-${APP_VERSION}-macOS-${BANDI_MAC_ARCH}"
          manifest="latest-${BANDI_MAC_ARCH}-mac.yml"
          for file in \
            "release/macos-${BANDI_MAC_ARCH}/${base}.dmg" \
            "release/macos-${BANDI_MAC_ARCH}/${base}.zip" \
            "release/macos-${BANDI_MAC_ARCH}/${manifest}"; do
            test -s "$file"
            cp "$file" "$target/"
          done
          MANIFEST_PATH="$target/$manifest" PRIMARY_PAYLOAD="${base}.zip" node --input-type=module <<'NODE'
          import fs from "node:fs";
          import yaml from "js-yaml";

          const manifestPath = process.env.MANIFEST_PATH;
          const primaryPayload = process.env.PRIMARY_PAYLOAD;
          const parsed = yaml.load(fs.readFileSync(manifestPath, "utf8"));
          if (!parsed || typeof parsed !== "object" || Array.isArray(parsed) || !Array.isArray(parsed.files)) {
            throw new Error("macOS update manifest is invalid");
          }
          const matches = parsed.files.filter((entry) => entry?.url === primaryPayload);
          if (matches.length !== 1 || parsed.path !== primaryPayload || parsed.sha512 !== matches[0].sha512) {
            throw new Error("macOS update manifest does not have one valid ZIP primary payload");
          }
          parsed.files = matches;
          fs.writeFileSync(manifestPath, yaml.dump(parsed, { lineWidth: -1, noRefs: true }), "utf8");
          NODE
          blockmap="release/macos-${BANDI_MAC_ARCH}/${base}.zip.blockmap"
          if [[ -s "$blockmap" ]]; then cp "$blockmap" "$target/"; fi

      - name: Upload macOS build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-macos-${{ matrix.arch }}
          path: ${{ runner.temp }}/bandi-release-assets/*
          if-no-files-found: error
          retention-days: 7

  draft-release:
    name: Assemble draft Release
    needs: [preflight, windows, macos]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Check out tagged commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.preflight.outputs.commit }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.14.1
          cache: npm

      - name: Install verification dependencies
        run: npm ci --ignore-scripts

      - name: Download platform artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Verify update metadata and generate checksums
        env:
          APP_VERSION: ${{ needs.preflight.outputs.version }}
        run: node scripts/verify-release-artifacts.mjs release-assets "$APP_VERSION"

      - name: Create new Draft Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_COMMIT: ${{ needs.preflight.outputs.commit }}
          APP_VERSION: ${{ needs.preflight.outputs.version }}
          MACOS_SIGNED_RELEASE: ${{ inputs.signed_macos }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "A Release already exists for ${RELEASE_TAG}; refusing to replace any existing assets." >&2
            exit 1
          fi

          if [[ "$MACOS_SIGNED_RELEASE" == "true" ]]; then
            mac_x64_note='- macOS Intel x64：Developer ID 已签名、公证并 stapled；应用内更新附件已生成。'
            mac_arm64_note='- macOS Apple Silicon arm64：Developer ID 已签名、公证并 stapled；应用内更新附件已生成。'
          else
            mac_x64_note='- macOS Intel x64：未签名，仅供人工验收；当前使用“下载新版”手动更新。'
            mac_arm64_note='- macOS Apple Silicon arm64：未签名，仅供人工验收；当前使用“下载新版”手动更新。'
          fi

          cat > "$RUNNER_TEMP/release-notes.md" <<EOF
          ## Bandi ${APP_VERSION}

          Commit: \`${RELEASE_COMMIT}\`

          - Windows Setup + portable：未签名，仅供人工验收；应用内更新附件已生成。
          ${mac_x64_note}
          ${mac_arm64_note}
          - Web 与配对 Safari：部署版本变化后提示刷新。

          此 Release 保持 Draft。人工完成安装、更新、真机和校验和验收后，另行决定是否公开。
          EOF

          git fetch --force --tags origin
          current_tag_commit="$(git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}")"
          if [[ "$current_tag_commit" != "$RELEASE_COMMIT" ]]; then
            echo "The remote tag moved after the build started; refusing to create a Release." >&2
            exit 1
          fi

          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --draft \
            --title "Bandi ${RELEASE_TAG}" \
            --notes-file "$RUNNER_TEMP/release-notes.md"

          mapfile -d '' assets < <(find release-assets -maxdepth 1 -type f -print0 | sort -z)
          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "No verified assets are available to upload." >&2
            exit 1
          fi
          if [[ "$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft')" != "true" ]]; then
            echo "Draft state changed before upload; refusing to upload assets." >&2
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY"

      - name: Confirm Release remains draft and assets are exact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          release_json="$RUNNER_TEMP/final-release.json"
          release_id="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json databaseId --jq '.databaseId')"
          if [[ ! "$release_id" =~ ^[0-9]+$ ]]; then
            echo "Draft Release ID is unavailable." >&2
            exit 1
          fi
          gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}" > "$release_json"
          if [[ "$(jq -r '.draft' "$release_json")" != "true" ]]; then
            echo "Release unexpectedly left draft state." >&2
            exit 1
          fi
          if [[ "$(jq -r '.prerelease' "$release_json")" != "false" ]]; then
            echo "Draft Release unexpectedly became a prerelease." >&2
            exit 1
          fi
          find release-assets -maxdepth 1 -type f -printf '%f\n' | sort > "$RUNNER_TEMP/expected-assets.txt"
          jq -r '.assets[].name' "$release_json" | sort > "$RUNNER_TEMP/actual-assets.txt"
          diff -u "$RUNNER_TEMP/expected-assets.txt" "$RUNNER_TEMP/actual-assets.txt"
          git fetch --force --tags origin
          if [[ "$(git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}")" != "${{ needs.preflight.outputs.commit }}" ]]; then
            echo "The remote tag moved while the Draft Release was assembled." >&2
            exit 1
          fi
          node scripts/verify-release-artifacts.mjs release-assets "${{ needs.preflight.outputs.version }}" "$release_json"
